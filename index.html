<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <main id="main-container">
        <header>
            <h1>Pomodoro</h1>
            <div id="progress-bar"></div>
        </header>
        <p id="greeting-text" class="sans-serif-font bold">¡Hola, <span class="bold">Diego</span>!</p>
        <section id="clock-section">
            <div id="options-container">
                <button id="pomodoro-mode-btn" class="option-btn active">Pomodoro</button>
                <button id="shortBreak-mode-btn" class="option-btn active">Short Break</button>
                <button id="longBreak-mode-btn" class="option-btn active">Long Break</button>
                <button id="focus-mode-btn" class="option-btn active">Focus track</button>
            </div>
            <div id="clock-container">
                <span id="min" class="main-time">00</span>
                <span class="main-time">:</span>
                <span id="sec" class="main-time">01</span>
            </div>
            <button id="start-time-btn" class="time-ctrl-btn">Junbi dekita?</button>
            <button id="pause-time-btn" class="time-ctrl-btn">Ganbare!</button>
        </section>
        <section id="task-section">
            <p id="pomodoro-count">1</p>
            <p class="sans-serif-font">Keep moving forward!</p>
        </section>
    </main>
</body>
</html>
