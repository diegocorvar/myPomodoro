<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main id="main-container">
        <header>
            <h1>Pomodoro</h1>
            <div id="progress-bar"></div>
        </header>
        <p id="greeting-text">¡Hola <span>Diego</span>!</p>
        <section id="clock-section">
            <div id="options-container">
                <button class="option-btn">Pomodoro</button>
                <button class="option-btn">Short Break</button>
                <button class="option-btn">Long Break</button>
                <button class="option-btn">Focus track</button>
            </div>
            <div id="clock-container">
                <p id="main-time">25:00:00</p>
            </div>
            <button id="time-ctrl-btn">Junbi dekita?</button>
        </section>
        <section id="task-section">
            <p id="pomodoro-count">1</p>
            <p>Keep moving forward!</p>
        </section>
    </main>
</body>
</html>
